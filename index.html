<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVNHANOI – Dashboard Quản lý Thiết Bị</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-bolt"></i></div>
      <div class="brand-text">
        <span class="brand-name">EVNHANOI</span>
        <span class="brand-sub">Hệ thống quản lý</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-label">CHÍNH</span>
      <a href="#" class="nav-item active">
        <i class="fas fa-chart-line"></i>
        <span>Dashboard</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fas fa-tools"></i>
        <span>Công tác</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fas fa-calendar-alt"></i>
        <span>Kế hoạch sản xuất</span>
      </a>
      <span class="nav-label">THIẾT BỊ</span>
      <a href="#" class="nav-item">
        <i class="fas fa-bolt"></i>
        <span>Máy cắt trung thế</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fas fa-exclamation-triangle"></i>
        <span>Sự cố</span>
      </a>
      <span class="nav-label">BÁO CÁO</span>
      <a href="#" class="nav-item">
        <i class="fas fa-file-alt"></i>
        <span>Kế hoạch TN</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fas fa-history"></i>
        <span>Lịch sử TN</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot"></span>
        <span class="status-text">Đang kết nối...</span>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Quản lý Thiết Bị</h1>
        <span class="page-sub">Tổng quan dữ liệu thời gian thực</span>
      </div>
      <div class="topbar-right">
        <div class="last-update" id="lastUpdate">--</div>
        <button class="refresh-btn" id="refreshBtn" onclick="loadDashboard()">
          <i class="fas fa-sync-alt"></i>
          Làm mới
        </button>
      </div>
    </header>

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <span>Đang tải dữ liệu...</span>
    </div>

    <!-- DYNAMIC PAGE CONTENT – rendered by app.js router -->
    <div id="mainSections"></div>

  </main>

  <script src="app.js"></script>
</body>
</html>
